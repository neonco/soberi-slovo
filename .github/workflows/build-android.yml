name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'capacitor.config.json'
      - 'package.json'
      - 'prototype/**'
      - 'content/**'
      - 'tools/build.py'
      - 'tools/make_icons.py'
      - '.github/workflows/build-android.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps (Capacitor CLI + android)
        run: npm install

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install SDK packages
        run: |
          sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Generate Android project
        run: npx cap add android

      - name: Decode release keystore
        env:
          KS_B64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "$KS_B64" | base64 -d > android/upload-keystore.jks

      - name: Inject signing config
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          F="android/app/build.gradle"
          # заменяем debug-подпись на release
          sed -i "s/signingConfig signingConfigs.debug/signingConfig signingConfigs.release/" "$F"
          if ! grep -q "signingConfigs" "$F"; then
            cat >> "$F" <<EOF

          android.signingConfigs {
              release {
                  storeFile file('../upload-keystore.jks')
                  storePassword '$KS_PASS'
                  keyAlias '$KEY_ALIAS'
                  keyPassword '$KEY_PASS'
              }
          }
          android.buildTypes.release.signingConfig = android.signingConfigs.release
          EOF
          fi

      - name: Sync config + web assets
        run: npx cap sync android

      - name: Generate app icons
        run: |
          pip install --quiet pillow
          python tools/make_icons.py

      - name: Build signed release APK
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 8.13
          build-root-directory: android
          arguments: assembleRelease
          cache-disabled: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: soberi-slovo-apk
          path: android/app/build/outputs/apk/release/*.apk
