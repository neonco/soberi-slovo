name: Generate Keystore (one-shot)

on:
  workflow_dispatch:

jobs:
  gen:
    runs-on: ubuntu-latest
    steps:
      - name: Generate release keystore
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASS: ${{ secrets.KEY_PASSWORD }}
        run: |
          keytool -genkeypair -v \
            -keystore upload-keystore.jks \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -alias "$KEY_ALIAS" \
            -storepass "$KS_PASS" -keypass "$KEY_PASS" \
            -dname "CN=neonco, OU=SoberiSlovo, O=neonco, L=Moscow, S=Moscow, C=RU"
          base64 upload-keystore.jks > keystore.b64
      - name: Upload keystore base64
        uses: actions/upload-artifact@v4
        with:
          name: keystore-b64
          path: keystore.b64
