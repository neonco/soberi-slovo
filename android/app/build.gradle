apply plugin: 'com.android.application'

android {
    namespace 'ru.neonco.soberislovo'
    compileSdk 34
    defaultConfig {
        applicationId 'ru.neonco.soberislovo'
        minSdk 23
        targetSdk 34
        versionCode 1
        versionName '1.0.0'
    }
    buildTypes {
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.7.0'
    implementation 'androidx.webkit:webkit:1.11.0'
    implementation files('../node_modules/@capacitor/android/android/capacitor-android.aar')
    implementation files('../node_modules/@capacitor/core/android/capacitor.aar')
}
