<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Собери слово — логопед</title>
<meta name="theme-color" content="#7BA05B">
<style>
@font-face{font-family:'Nunito';font-style:normal;font-weight:500 900;font-display:swap;src:url('fonts/nunito.woff2') format('woff2')}
@font-face{font-family:'Quicksand';font-style:normal;font-weight:500 700;font-display:swap;src:url('fonts/quicksand.woff2') format('woff2')}
</style>
<script>
// одноразовая отписка устаревшего Service Worker (оставлен прежними версиями)
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.getRegistrations().then(function(rs){ rs.forEach(function(r){ r.unregister(); }); });
  if (window.caches) caches.keys().then(function(ks){ ks.forEach(function(k){ caches.delete(k); }); });
}
</script>
<style>
:root{
  /* типографика */
  --font-display:'Nunito','Segoe UI',system-ui,sans-serif;
  --font-body:'Quicksand','Segoe UI',system-ui,sans-serif;
  /* яркая, но мягкая палитра (для ребёнка 5 лет, читается с 2 м) */
  --bg:42 60% 96%;          /* тёплый светлый фон */
  --bg-grain:42 45% 88%;
  --ink:155 35% 18%;        /* насыщенный тёмно-зелёный текст (контраст) */
  --ink-soft:155 22% 32%;
  --ink-faint:155 20% 38%;
  --hero:122 52% 38%;       /* насыщенный зелёный акцент */
  --hero-soft:122 55% 88%;
  --sky:200 75% 52%;        /* яркий голубой */
  --green:140 55% 42%;      /* ярко-зелёный (успех) */
  --red:8 78% 56%;          /* яркий красный (ошибка) */
  --card:0 0% 100%;
  --ring:122 55% 42%;
  --radius:22px;
  --radius-sm:14px;
  --shadow-1:0 1px 2px rgba(40,35,20,.06),0 3px 8px rgba(40,35,20,.08),0 6px 16px rgba(40,35,20,.06);
  --shadow-2:0 3px 6px rgba(40,35,20,.08),0 8px 20px rgba(40,35,20,.10),0 16px 34px rgba(40,35,20,.08);
  --ease-out:cubic-bezier(.23,1,.32,1);
  --ease-spring:cubic-bezier(.34,1.56,.64,1);
  --z-base:0; --z-dropdown:10; --z-sticky:20; --z-overlay:40; --z-modal:100; --z-toast:1000;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale;text-rendering:optimizeLegibility}
body{
  font-family:var(--font-body);
  background:
    radial-gradient(circle at 20% 12%, hsl(var(--bg-grain)/.5) 0, transparent 45%),
    radial-gradient(circle at 82% 88%, hsl(var(--bg-grain)/.4) 0, transparent 40%),
    hsl(var(--bg));
  color:hsl(var(--ink));
  min-height:100vh; overflow-x:hidden; touch-action:manipulation;
}
h1,h2,h3,h4{font-family:var(--font-display);text-wrap:balance;font-weight:900;letter-spacing:.2px}
.app-title,.section-title,.level-name,.mode-card .mn,.win-title,.cat-panel h2{text-wrap:balance}
p,li,dd,blockquote{text-wrap:pretty}
[data-numeric]{font-variant-numeric:tabular-nums}
button{font-family:inherit}
img,video{outline:1px solid rgba(60,50,30,.06);outline-offset:-1px}
*:focus-visible{outline:3px solid hsl(var(--ring));outline-offset:3px;border-radius:var(--radius-sm)}
.hidden{display:none !important}
.screen{min-height:100vh; display:flex; flex-direction:column; align-items:center; padding:20px 16px 32px; gap:16px; width:100%; max-width:560px; margin:0 auto; position:relative}

/* кастомная полоса прокрутки — в стиле палитры, тонкая */
* { scrollbar-width: thin; scrollbar-color: hsl(var(--hero)/.4) transparent; }
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:hsl(var(--hero)/.35);border-radius:8px;border:2px solid hsl(var(--bg))}
::-webkit-scrollbar-thumb:hover{background:hsl(var(--hero)/.55)}
@media (hover:none){ * { scrollbar-width:none } ::-webkit-scrollbar{display:none} }

/* шестерёнка настроек — маленькая, в углу */
.gear-btn{position:absolute;top:16px;right:16px;width:46px;height:46px;border-radius:50%;border:none;background:hsl(var(--card));font-size:22px;cursor:pointer;box-shadow:var(--shadow-1);z-index:var(--z-sticky);transition:transform .15s var(--ease-out),box-shadow .2s}
@media (hover:hover) and (pointer:fine){ .gear-btn:hover{transform:rotate(35deg)} }
.gear-btn:active{transform:scale(.92)}

/* строки в панели настроек */
.cat-panel .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:12px}
.cat-panel label{font-size:15px;font-weight:600;color:hsl(var(--ink))}

/* ---------- HEADER ---------- */
.app-title{font-size:32px;font-weight:900;color:hsl(var(--hero));text-align:center;text-shadow:0 2px 0 hsl(var(--hero)/.12)}
.app-sub{font-size:14px;color:hsl(var(--ink-soft));text-align:center;margin-top:-8px;font-weight:600}

/* ---------- SETTINGS ---------- */
.settings{width:100%;background:hsl(var(--card));border-radius:var(--radius);padding:14px 16px;box-shadow:var(--shadow-1);display:flex;flex-direction:column;gap:12px;border:1px solid hsl(40 30% 88%)}
.settings summary{cursor:pointer;font-weight:700;color:hsl(var(--ink-soft));font-size:15px;list-style:none;padding:4px 0}
.settings summary::before{content:'⚙️ ';}
.settings .row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px}
.settings label{font-size:14px;font-weight:600;color:hsl(var(--ink))}
select#voiceSelect{max-width:220px;padding:8px 10px;border-radius:var(--radius-sm);border:2px solid hsl(40 25% 85%);font-size:13px;background:#fff;font-family:var(--font-body)}
.test-btn{padding:7px 10px;border-radius:14px;border:2px solid hsl(var(--sky));background:hsl(200 60% 96%);color:hsl(200 55% 40%);font-weight:700;font-size:13px;cursor:pointer;transition:transform .12s var(--ease-out),background .2s,color .2s,border-color .2s}
.test-btn:active{transform:scale(.96)}
.test-btn.voice-opt,.test-btn.pic-opt{border-color:hsl(40 25% 85%);background:#fff;color:hsl(var(--ink-faint))}
.test-btn.voice-opt.on,.test-btn.pic-opt.on{border-color:hsl(var(--sky));background:hsl(200 60% 96%);color:hsl(200 55% 40%)}
@media (max-width:420px){ #voiceGrid{grid-template-columns:1fr 1fr} }
.toggle{position:relative;width:52px;height:28px;background:hsl(40 20% 80%);border-radius:16px;cursor:pointer;transition:background .25s var(--ease-out);flex-shrink:0;border:none}
.toggle.on{background:hsl(var(--green))}
.toggle:active{transform:scale(.94)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:22px;height:22px;background:#fff;border-radius:50%;transition:transform .25s var(--ease-out);box-shadow:0 1px 3px rgba(60,50,30,.25)}
.toggle.on::after{transform:translateX(24px)}

/* ---------- LEVEL LIST ---------- */
.section-title{font-size:18px;font-weight:800;color:hsl(var(--ink));align-self:flex-start;margin-top:6px}
.level-card{
  width:100%;background:hsl(var(--card));border-radius:var(--radius);padding:16px 18px;
  box-shadow:var(--shadow-1);cursor:pointer;border:1px solid hsl(40 30% 88%);
  display:flex;align-items:center;gap:14px;transition:transform .15s var(--ease-out),box-shadow .2s var(--ease-out);
  animation:cardIn .4s var(--ease-out) both;
}
@media (hover:hover) and (pointer:fine){ .level-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)} }
.level-card:active{transform:scale(.98)}
.level-badge{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:800;color:#fff;flex-shrink:0;box-shadow:inset 0 -3px 6px rgba(0,0,0,.12)}
.level-info{flex:1}
.level-name{font-size:17px;font-weight:800;color:hsl(var(--ink))}
.level-struct{font-size:13px;color:hsl(var(--ink-soft));font-weight:600;margin-top:2px}
.level-words{font-size:12px;color:hsl(var(--ink-faint));margin-top:3px}
.level-progress{font-size:13px;font-weight:800;color:hsl(var(--hero));background:hsl(var(--hero-soft));border-radius:14px;padding:6px 12px;white-space:nowrap}
@keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.lv1{background:hsl(18 70% 60%)}.lv2{background:hsl(140 40% 55%)}.lv3{background:hsl(200 60% 62%)}
.lv4{background:hsl(280 40% 62%)}.lv5{background:hsl(170 45% 50%)}.lv6{background:hsl(330 55% 65%)}.lv7{background:hsl(35 75% 60%)}

/* ---------- GAME ---------- */
.game-top{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px}
.back-btn{width:58px;height:58px;border-radius:50%;background:hsl(var(--card));border:none;font-size:28px;cursor:pointer;box-shadow:var(--shadow-1);transition:transform .12s var(--ease-out),box-shadow .2s;flex-shrink:0}
.back-btn:active{transform:scale(.92)}
.progress-pill{font-size:18px;font-weight:800;color:hsl(var(--hero));background:hsl(var(--card));padding:10px 20px;border-radius:22px;box-shadow:var(--shadow-1);font-variant-numeric:tabular-nums;flex:1;text-align:center}
.level-tag{font-size:13px;font-weight:700;color:hsl(var(--ink-soft))}
/* видимая полоска прогресса уровня */
.level-bar{width:100%;height:12px;border-radius:8px;background:hsl(var(--hero-soft));overflow:hidden;box-shadow:inset 0 1px 2px rgba(40,35,20,.1)}
.level-bar > i{display:block;height:100%;background:hsl(var(--hero));border-radius:8px;transition:width .4s var(--ease-out)}

.main-card{
  width:min(72vw,260px);height:min(72vw,260px);border-radius:40px;background:hsl(var(--card));
  display:flex;align-items:center;justify-content:center;font-size:120px;
  box-shadow:var(--shadow-2);border:8px solid hsl(var(--hero)/.55);
  transition:transform .4s var(--ease-spring); cursor:pointer;
  overflow:hidden;
}
.main-card.pop{transform:scale(1.06)}
.win-glow{box-shadow:0 0 0 0 hsl(var(--green)/.5), var(--shadow-2);animation:winGlow 1.4s ease-out}
@keyframes winGlow{0%{box-shadow:0 0 0 0 hsl(var(--green)/.55), var(--shadow-2)}100%{box-shadow:0 0 0 26px hsl(var(--green)/0), var(--shadow-2)}}

.slots{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;min-height:80px;align-items:center}
.slot{
  min-width:120px;height:84px;border:4px dashed hsl(40 20% 75%);border-radius:40px;
  display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;
  color:hsl(40 20% 68%);background:hsl(var(--card));padding:0 22px;cursor:pointer;transition:transform .2s var(--ease-out),border-color .2s,background .2s,color .2s;position:relative;
}
.slot.active{animation:slotPulse 1.6s ease-in-out infinite}
@keyframes slotPulse{0%,100%{box-shadow:0 0 0 0 hsl(var(--hero)/0)}50%{box-shadow:0 0 0 6px hsl(var(--hero)/.15)}}
.slot.filled{border:3px solid var(--green);background:hsl(140 45% 94%);color:hsl(140 45% 30%)}
.slot-return{position:absolute;top:-10px;right:-6px;font-size:13px;background:#fff;border-radius:50%;width:24px;height:24px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(60,50,30,.2);color:hsl(var(--ink-soft));cursor:pointer}
.slot.stress-ok{border-color:hsl(35 75% 60%);background:hsl(35 80% 92%);color:hsl(30 70% 38%)}
.slot.wrong{border-color:hsl(var(--red));background:hsl(8 70% 95%);color:hsl(8 65% 45%);animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

.pills{display:flex;gap:16px;flex-wrap:wrap;justify-content:center;min-height:80px}
.pill{
  min-width:110px;height:84px;border-radius:40px;border:none;
  display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:#fff;
  cursor:pointer;box-shadow:0 4px 12px rgba(60,50,30,.20);padding:0 26px;user-select:none;
  transition:transform .12s var(--ease-out),opacity .2s var(--ease-out);
}
.pill:active{transform:scale(.92)}
.pill.used{opacity:0;pointer-events:none;transform:scale(.5)}
.c0{background:hsl(122 52% 38%)}.c1{background:hsl(125 48% 44%)}.c2{background:hsl(128 50% 50%)}
.c3{background:hsl(131 46% 56%)}.c4{background:hsl(118 54% 34%)}.c5{background:hsl(134 44% 62%)}

.controls{display:flex;gap:14px;margin-top:4px}
.ctl{padding:15px 30px;border-radius:28px;font-size:20px;font-weight:800;border:none;cursor:pointer;box-shadow:0 3px 12px rgba(60,50,30,.15);color:#fff;transition:transform .12s var(--ease-out),box-shadow .2s,opacity .2s}
.ctl:active{transform:scale(.95)}
.ctl.listen{background:hsl(var(--sky))}
.ctl.check{background:hsl(var(--green))}
.ctl.check:disabled{background:hsl(40 20% 75%);box-shadow:none;cursor:default}

/* ---------- РЕЖИМ «ПОКАЖИ» / «ГЛАГОЛЫ» ---------- */
.skip-link{position:absolute;left:-9999px;top:0;background:hsl(var(--hero));color:#fff;padding:10px 18px;border-radius:12px;font-weight:800;z-index:var(--z-toast)}
.skip-link:focus{left:12px;top:12px}
.play-card{width:100%;background:linear-gradient(135deg,hsl(var(--hero)/.12),hsl(200 55% 80%/.18));border:2px solid hsl(var(--hero)/.35);border-radius:var(--radius);padding:22px 18px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;box-shadow:var(--shadow-2);transition:transform .15s var(--ease-out),box-shadow .2s var(--ease-out);animation:cardIn .4s var(--ease-out) both}
@media (hover:hover) and (pointer:fine){ .play-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)} }
.play-card:active{transform:scale(.98)}
.play-card .pc-emoji{font-size:56px;line-height:1}
.play-card .pc-title{font-family:var(--font-display);font-size:26px;font-weight:900;color:hsl(var(--hero))}
.more-games{width:100%;display:flex;gap:10px}
.mode-grid{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mode-card{flex:1;background:hsl(var(--card));border-radius:var(--radius);padding:14px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;box-shadow:var(--shadow-1);border:1px solid hsl(40 30% 88%);transition:transform .15s var(--ease-out),box-shadow .2s var(--ease-out);animation:cardIn .4s var(--ease-out) both}
@media (hover:hover) and (pointer:fine){ .mode-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-2)} }
.mode-card:active{transform:scale(.97)}
.mode-card .me{font-size:38px}
.mode-card .mn{font-size:14px;font-weight:800;color:hsl(var(--ink));text-align:center}
.cat-overlay{position:fixed;inset:0;background:hsla(155,30%,25%,.82);backdrop-filter:blur(3px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:var(--z-overlay);padding:20px;gap:14px}
.cat-overlay.on{display:flex;animation:fade .35s var(--ease-out)}
.cat-panel{background:hsl(var(--card));border-radius:24px;padding:22px;max-width:440px;width:100%;display:flex;flex-direction:column;gap:10px;max-height:90vh;overflow-y:auto;box-shadow:var(--shadow-2)}
.cat-panel h2{font-size:20px;color:hsl(var(--hero));text-align:center}
.cat-item{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:16px;background:hsl(150 40% 96%);cursor:pointer;border:2px solid transparent;transition:transform .12s var(--ease-out),border-color .2s}
@media (hover:hover) and (pointer:fine){ .cat-item:hover{border-color:hsl(var(--hero-soft))} }
.cat-item:active{transform:scale(.97)}
.cat-item .ce{font-size:30px}
.cat-item .cn{font-size:17px;font-weight:800;flex:1;color:hsl(var(--ink))}
.cat-item .cc{font-size:12px;color:hsl(var(--ink-faint));font-weight:700}
.pick-grid{display:grid;grid-template-columns:1fr 1fr;gap:18px;margin-top:8px}
.pick-card{width:150px;height:150px;border-radius:50%;background:hsl(var(--card));display:flex;align-items:center;justify-content:center;font-size:72px;cursor:pointer;box-shadow:var(--shadow-2);border:5px solid hsl(200 55% 82%);transition:transform .25s var(--ease-spring),border-color .2s,background .2s;overflow:hidden}
@media (hover:hover) and (pointer:fine){ .pick-card:hover{transform:translateY(-3px)} }
.pick-card:active{transform:scale(.94)}
.pick-card.good{border-color:hsl(var(--green));background:hsl(140 45% 94%);transform:scale(1.08)}
.pick-card.bad{border-color:hsl(var(--red));background:hsl(8 70% 95%);animation:shake .4s}
.pick-card.verb-card{flex-direction:column;gap:2px}
.pick-card .vb{font-size:16px;font-weight:800;color:hsl(var(--ink))}
.hear-btn{padding:14px 34px;border-radius:28px;background:hsl(var(--sky));color:#fff;border:none;font-size:20px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(60,50,30,.15);transition:transform .12s var(--ease-out)}
.hear-btn:active{transform:scale(.95)}
.ctl.yes{background:hsl(var(--green))}
.ctl.no{background:hsl(var(--red))}
.yn-word{font-size:26px;font-weight:800;color:hsl(var(--ink));background:hsl(var(--card));padding:8px 24px;border-radius:18px;box-shadow:var(--shadow-1)}

/* ---------- SUCCESS OVERLAY ---------- */
.overlay{position:fixed;inset:0;background:hsla(155,30%,25%,.82);backdrop-filter:blur(3px);display:none;flex-direction:column;align-items:center;justify-content:center;z-index:var(--z-overlay);gap:18px;padding:20px}
.overlay.on{display:flex;animation:fade .35s var(--ease-out)}
@keyframes fade{from{opacity:0}to{opacity:1}}
.win-card{background:hsl(var(--card));border-radius:28px;padding:32px 36px;display:flex;flex-direction:column;align-items:center;gap:14px;box-shadow:0 12px 40px rgba(40,30,10,.3),0 0 0 4px hsl(var(--green)/.35);max-width:90%;animation:winIn .4s var(--ease-spring) both}
@keyframes winIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.win-emoji{font-size:72px;filter:drop-shadow(0 0 12px hsl(var(--green)/.6))}
.win-title{font-size:30px;font-weight:800;color:hsl(var(--hero))}
.win-words{font-size:15px;color:hsl(var(--ink-soft));text-align:center;line-height:1.6;max-height:120px;overflow-y:auto}
.win-stars{font-size:38px;letter-spacing:6px}
.menu-btn{padding:14px 38px;background:hsl(var(--sky));color:#fff;border:none;border-radius:26px;font-size:19px;font-weight:800;cursor:pointer;box-shadow:0 3px 12px rgba(60,50,30,.18);transition:transform .12s var(--ease-out)}
.menu-btn:active{transform:scale(.95)}

.particle{position:fixed;font-size:22px;pointer-events:none;animation:float 2.2s ease-out forwards;z-index:var(--z-toast)}
@keyframes float{0%{opacity:1;transform:translateY(0) scale(.5)}100%{opacity:0;transform:translateY(-180px) scale(1.2)}}

@media (prefers-reduced-motion: reduce){
  *{animation-duration:.01ms !important;transition-duration:.01ms !important}
  .level-card,.mode-card,.win-card{animation:none}
}
</style>
</head>
<body>

<!-- Экранный диктор для вспомогательных технологий -->
<div id="announcer" aria-live="polite" aria-atomic="true" style="position:absolute;left:-9999px;top:0;width:1px;height:1px;overflow:hidden"></div>

<!-- ===== ГЛАВНЫЙ ЭКРАН ===== -->
<div class="screen" id="homeScreen">
  <button class="gear-btn" id="gearBtn" aria-label="Настройки взрослого" title="Настройки">⚙️</button>

  <div class="app-title">Собери слово</div>
  <div class="app-sub">слоговые карточки</div>

  <a class="skip-link" href="#levelsList">К уровням слогов ↓</a>

  <button class="play-card" id="playCard" role="button" tabindex="0"
    onclick="document.getElementById('levelsList').scrollIntoView({behavior:'smooth'})"
    onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();document.getElementById('levelsList').scrollIntoView({behavior:'smooth'});}">
    <span class="pc-emoji">🧩</span>
    <span class="pc-title">К уровням</span>
  </button>

  <div class="more-games" id="moreGames">
    <div class="mode-card" role="button" tabindex="0" onclick="showPickCategories()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();showPickCategories();}">
      <span class="me">👂</span><span class="mn">Покажи!</span>
    </div>
    <div class="mode-card" role="button" tabindex="0" onclick="startVerbs()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startVerbs();}">
      <span class="me">🏃</span><span class="mn">Что делает?</span>
    </div>
    <div class="mode-card" role="button" tabindex="0" onclick="startYesNo()" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();startYesNo();}">
      <span class="me">💬</span><span class="mn">Да или нет?</span>
    </div>
  </div>

  <div class="section-title">Уровни слогов</div>
  <div id="levelsList" style="width:100%;display:flex;flex-direction:column;gap:12px"></div>
</div>

<!-- ===== ИГРОВОЙ ЭКРАН ===== -->

<script>
"use strict";
/* ====== ДАННЫЕ: вся база syllable-cards.json встроена сюда ====== */
const DATA = /*__DATA__*/;
/* ====== ДОП. СЛОВА: цифры, растения, профессии, глаголы ====== */
const EXTRA = /*__EXTRA__*/;

/* ====== ЭМОДЗИ ДЛЯ КАРТИНОК (ключ image -> эмодзи) ====== */
const EMOJI = {
  airplane:"✈️",aunt:"👱‍♀️",axe:"🪓",ball:"⚽",banana:"🍌",basin:"🪣",bear:"🐻",
  borscht:"🍲",bow:"🎀",bowl:"🥣",box:"📦",boy:"👦",braid:"💇‍♀️",branch:"🌿",
  bridge:"🌉",briefcase:"💼",boot:"🥾",bye:"👋",camel:"🐫",candy:"🍬",car:"🚗",
  carriage:"🛞",carrot:"🥕",cash_register:"🧾",
  cat:"🐱",cat_female:"😺",cheese:"🧀",chick:"🐤",coat:"🧥",cockatoo:"🦜",cocoa:"☕",
  compote:"🍹",corn:"🌽",corridor:"🚪",cow:"🐮",crayfish:"🦞",crocodile:"🐊",crow:"🐦‍⬛",
  crust:"🍞",cucumber:"🥒",dog:"🐶",doll:"🪆",drum:"🥁",dump_truck:"🚚",excavator:"🏗️",
  envelope:"✉️",father:"👨",
  female_animal:"🐾",floor:"🟫",forest:"🌲",garage:"🅿️",garden:"🌷",goat:"🐐",
  goose:"🪿",grade:"💯",grandmother:"👵",hammer:"🔨",hand:"✋",handkerchief:"🤧",
  harmonica:"🪗",head:"🗣️",helicopter:"🚁",hippopotamus:"🦛",honey:"🍯",house:"🏠",
  iron:"🧺",jar:"🫙",juice:"🧃",kitten:"🐱",kitty:"🐈",knife:"🔪",lamb:"🐑",
  lamp:"💡",lard:"🥓",leg:"🦵",macaque:"🐒",marmalade:"🍬",meat:"🥩",midge:"🦟",
  milk:"🥛",mother:"👩",mother_affectionate:"🤱",mouse:"🐭",mouth:"👄",nest:"🪹",
  nose:"👃",onion:"🧅",orange:"🍊",owl:"🦉",pacifier:"🍼",panda:"🐼",parrot:"🦜",
  peas:"🫛",pee:"🚽",pencil:"✏️",pie:"🥧",piglet:"🐷",pineapple:"🍍",plate:"🍽️",
  pocket:"👖",poop:"💩",pool:"🏊",porridge:"🥣",pot:"🫕",raspberry:"🍇",rat:"🐀",
  remote:"📱",robe:"👘",sail:"⛵",
  salad:"🥗",sand:"🏖️",sandwich:"🥪",shelf:"🗄️",ship:"🚢",side:"↔️",slipper:"🥿",
  small_ball:"🏀",small_cake:"🧁",small_table:"🪑",snake:"🐍",sock:"🧦",sofa:"🛋️",
  soup:"🍜",sphere:"🔮",spike:"🦔",steamship:"🛳️",stick:"🥢",suit:"🤵",tea:"🍵",
  telephone:"☎️",parachute:"🪂",
  tomato:"🍅",tops:"👕",towel:"🧖",tractor:"🚜",train:"🚂",tray:"🍱",tulip:"🌷",uncle:"🧔",
  vegetable:"🥦",water:"💧",watermelon:"🍉",whale:"🐋",wolf:"🐺",year:"📅",yogurt:"🍶",zucchini:"🍈"
};
const emojiFor = key => EMOJI[key] || "🖼️";

/* ====== НАСТРОЙКИ ====== */
function loadJSON(key, fallback){
  try { const v = JSON.parse(localStorage.getItem(key)); return v || fallback; }
  catch(e){ return fallback; }
}
function saveJSON(key, value){
  try { localStorage.setItem(key, JSON.stringify(value)); } catch(e){}
}

const settings = loadJSON('sw_settings', {});
let shuffleOn = settings.shuffle === true;   // слоги — по умолчанию ВЫКЛ
let stressOn  = settings.stress  !== false;
let voiceGen  = settings.voiceGen || 's8'; // Яндекс: s8 Марина(умолчание), s6 Алёна, s7 Филипп, s9 Женя, s10 Оксана, s11 Захар, s12 Ермил
if(!['s6','s7','s8','s9','s10','s11','s12'].includes(voiceGen)) voiceGen = 's8';
let speechSpeed = settings.speed || 1.0;   // темп воспроизведения 0.6–1.1
let transitionDelay = settings.transitionDelay || 4.5; // задержка автоперехода после правильного слова, сек (ОНР: дать осознать)
let picMode = settings.picMode || 'emoji'; // 'auto' | 'emoji' | 'image'

/* прогресс: слово -> 'mastered' (только пользовательский, чистый старт без учёта статусов из JSON) */
const progress = loadJSON('sw_progress', {});
const statusOf = w => progress[w.word] || 'planned';

function saveSettings(){
  saveJSON('sw_settings', {shuffle:shuffleOn, stress:stressOn, voiceGen, speed:speechSpeed, transitionDelay, picMode});
}

/* картинка слова: images/<слово>.png, если нет — эмодзи. Режим auto = картинка при наличии файла */
function setCardContent(el, word, emoji){
  el.innerHTML = '';
  if(picMode === 'emoji'){
    el.textContent = emoji;
  } else {
    const img = document.createElement('img');
    img.src = 'images/' + safe(word) + '.png';
    img.alt = word;
    img.style.cssText = 'width:88%;height:88%;object-fit:contain;border-radius:inherit';
    img.onerror = () => { el.textContent = emoji; };
    el.appendChild(img);
  }
}

/* ====== ОЗВУЧКА: Yandex SpeechKit, файлы в audio/<диктор>/ ====== */
const safe = t => t.toLowerCase().replace(/[^\wа-яё-]/gu, '_');
const PHRASES = ['молодец', 'попробуй ещё', 'молодец! ты собрала все слова!',
                 'покажи', 'это', 'да', 'нет', 'правильно', 'умница', 'что делает?'];
const WORDSET = new Set();
DATA.levels.forEach(l => l.words.forEach(w => WORDSET.add(w.word)));
EXTRA.categories.forEach(c => c.words.forEach(w => WORDSET.add(w.word)));
EXTRA.verbs.forEach(v => WORDSET.add(v.word));
let currentAudio = null; // тот, что сейчас играет

function audioFile(text){
  const t = text.toLowerCase();
  const prefix = WORDSET.has(t) ? 'w_' : (PHRASES.includes(t) ? 'p_' : 's_');
  return `audio/${voiceGen}/${prefix}${safe(t)}.mp3`;
}

function stopAllAudio(){
  if(currentAudio){
    const a = currentAudio;
    currentAudio = null;
    a.onended = null;
    a.onerror = null;
    // мягкое затухание ~120 мс вместо резкого обрыва — убирает щелчки/искажения при быстрых тапах
    const t0 = performance.now();
    const fade = () => {
      const k = 1 - (performance.now() - t0) / 120;
      if(k <= 0){ a.pause(); a.currentTime = 0; return; }
      a.volume = Math.max(0, k);
      requestAnimationFrame(fade);
    };
    fade();
  }
  if('speechSynthesis' in window) speechSynthesis.cancel();
}

function announce(text){
  const a = $('announcer');
  if(a) a.textContent = text;
}

function speak(text, onend){
  announce(text);
  stopAllAudio();
  const src = audioFile(text);
  const a = new Audio(src);
  currentAudio = a;
  a.playbackRate = speechSpeed;

  const cleanup = () => { if(currentAudio === a) currentAudio = null; };
  a.onended = () => { cleanup(); if(onend) onend(); };
  a.onerror = () => { cleanup(); ttsFallback(text); if(onend) onend(); };
  a.play().catch(() => { cleanup(); ttsFallback(text); if(onend) onend(); });
}

/* последовательное озвучивание: speakSeq(['покажи','киса']) */
function speakSeq(parts){
  const [head, ...rest] = parts;
  if(!head) return;
  speak(head, () => speakSeq(rest));
}

function ttsFallback(text){
  if(!('speechSynthesis' in window)) return;
  const u = new SpeechSynthesisUtterance(text);
  u.lang='ru-RU'; u.rate=0.75 * speechSpeed; u.pitch=1.1;
  const vs = speechSynthesis.getVoices().filter(v => v.lang.toLowerCase().startsWith('ru'));
  if(vs.length) u.voice = vs[0];
  speechSynthesis.speak(u);
}

/* ====== ГЛАВНЫЙ ЭКРАН ====== */
const $ = id => document.getElementById(id);
function haptic(ms=50){ if('vibrate' in navigator) navigator.vibrate(ms); }

function renderLevels(){
  const box = $('levelsList');
  box.innerHTML = '';
  DATA.levels.forEach((lv, i) => {
    const total = lv.words.length;
    const mastered = lv.words.filter(w => statusOf(w)==='mastered').length;
    const card = document.createElement('div');
    card.className = 'level-card';
    card.setAttribute('role', 'button');
    card.setAttribute('tabindex', '0');
    card.setAttribute('aria-label', `${lv.name}, уровень ${i+1}`);
    card.innerHTML = `
      <div class="level-badge lv${i+1}">${i+1}</div>
      <div class="level-info">
        <div class="level-name">${lv.name}</div>
        <div class="level-struct">${lv.structure} · тип ${lv.markova_type}</div>
        <div class="level-words">${lv.words.slice(0,6).map(w=>w.word).join(', ')}…</div>
      </div>
      <div class="level-progress">${mastered}/${total} ⭐</div>`;
    const openLevel = () => startLevel(i);
    card.onclick = openLevel;
    card.onkeydown = e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); openLevel(); } };
    box.appendChild(card);
  });
}

/* ====== ИГРА ====== */
/* цвета слогов как на марковских карточках: 1-й красный, 2-й синий, 3-й зелёный, 4-й оранжевый (пастель) */
const SYL_COLORS = ['hsl(18 70% 60%)', 'hsl(200 60% 62%)', 'hsl(140 40% 55%)', 'hsl(35 75% 60%)'];
const LV_COLORS = ['hsl(18 70% 60%)', 'hsl(140 40% 55%)', 'hsl(200 60% 62%)', 'hsl(280 40% 62%)', 'hsl(170 45% 50%)', 'hsl(330 55% 65%)', 'hsl(35 75% 60%)'];
let levelColor = LV_COLORS[0];
let session = [];        // слова сессии
let wi = 0;              // индекс слова
let slotsState = [];     // слог в каждом слоте
let pillUsed = [];       // занята ли пилюля
let done = false;
let stars = 0;

function startLevel(li){
  const lv = DATA.levels[li];
  // порядок: mastered -> learning -> planned (повторение сначала)
  const rank = {mastered:0, learning:1, planned:2};
  session = [...lv.words].sort((a,b)=>rank[statusOf(a)]-rank[statusOf(b)]);
  levelColor = LV_COLORS[li % LV_COLORS.length];
  wi = 0; stars = 0;
  haptic(60);   // заземляющая вибрация при входе в уровень
  $('homeScreen').classList.add('hidden');
  $('gameScreen').classList.remove('hidden');
  loadWord();
}

function loadWord(){
  const w = session[wi];
  done = false;
  slotsState = new Array(w.syllables.length).fill(null);
  $('progressPill').textContent = `${wi+1} / ${session.length} ▾`;
  $('levelBarFill').style.width = `${Math.round((wi) / session.length * 100)}%`;
  setCardContent($('mainCard'), w.word, emojiFor(w.image));
  $('mainCard').classList.remove('pop');

  // рамка карточки в цвет уровня
  $('mainCard').style.borderColor = levelColor;

  const slotsBox = $('slots'); slotsBox.innerHTML='';
  w.syllables.forEach((_, idx) => {
    const s = document.createElement('div');
    s.className = 'slot'; s.textContent = '?';
    s.dataset.color = SYL_COLORS[idx % SYL_COLORS.length];
    s.dataset.idx = idx;
    // короткий тап по занятому слоту — озвучить слог (повтор); по крестику ↩ — вернуть
    s.onclick = (e) => {
      if(e.target.classList.contains('slot-return')) { onSlotReturn(idx); return; }
      onSlotTap(idx);
    };
    // длинный тап (500мс) по занятому слоту — вернуть в пилюлю
    let pressTimer = null;
    s.addEventListener('pointerdown', () => {
      if(slotsState[idx]) pressTimer = setTimeout(() => onSlotReturn(idx), 500);
    });
    const clearT = () => { if(pressTimer){ clearTimeout(pressTimer); pressTimer = null; } };
    s.addEventListener('pointerup', clearT);
    s.addEventListener('pointerleave', clearT);
    s.addEventListener('pointercancel', clearT);
    slotsBox.appendChild(s);
  });
  // мягкая пульсация-якорь на первом пустом слоте
  slotsBox.children[0]?.classList.add('active');

  const pillsBox = $('pills'); pillsBox.innerHTML='';
  let order = w.syllables.map((s,i)=>i);
  if(shuffleOn) order.sort(()=>Math.random()-.5);
  pillUsed = new Array(order.length).fill(false);
  order.forEach((sylIdx, pos) => {
    const p = document.createElement('button');
    p.className = 'pill';
    p.style.background = SYL_COLORS[sylIdx % SYL_COLORS.length];  // цвет позиции слога, как на карточках
    p.textContent = w.syllables[sylIdx];
    p.onclick = () => onPillTap(pos, w.syllables[sylIdx]);
    pillsBox.appendChild(p);
  });

  setTimeout(()=>speak(w.word), 400);
}

function onPillTap(pos, syl){
  if(done) return;
  const empty = slotsState.findIndex(s => s===null);
  if(empty === -1) return;
  slotsState[empty] = {syl, pos};
  pillUsed[pos] = true;
  const slotEl = $('slots').children[empty];
  slotEl.textContent = syl;
  slotEl.classList.add('filled'); slotEl.classList.remove('wrong','active');
  // кликабельный крестик возврата
  const ret = document.createElement('span');
  ret.className = 'slot-return'; ret.textContent = '↩';
  ret.setAttribute('aria-hidden','true');
  slotEl.appendChild(ret);
  slotEl.style.borderColor = slotEl.dataset.color;
  slotEl.style.color = slotEl.dataset.color;
  slotEl.style.background = slotEl.dataset.color.replace(')', ' / 12%)').replace('hsl(', 'hsla(');
  $('pills').children[pos].classList.add('used');
  // все слоты заполнены — автопроверка ПОСЛЕ того, как доиграет озвучка слога
  if(slotsState.every(s => s!==null)){
    done = true;   // блокируем тапы на время проверки
    speak(syl, () => setTimeout(checkAnswer, 400));
  } else {
    speak(syl);
  }
}

function onSlotTap(idx){
  if(done) return;
  const cell = slotsState[idx];
  if(!cell){ return; }            // пустой слот — ничего
  speak(cell.syl);                 // занятый слот — повторить слог (якорь)
}
function onSlotReturn(idx){
  if(done) return;
  const cell = slotsState[idx];
  if(!cell) return;
  // вернуть слог в пилюлю
  pillUsed[cell.pos] = false;
  $('pills').children[cell.pos].classList.remove('used');
  slotsState[idx] = null;
  const slotEl = $('slots').children[idx];
  slotEl.textContent='?'; slotEl.classList.remove('filled','wrong','stress-ok','active');
  slotEl.querySelector('.slot-return')?.remove();
  slotEl.style.borderColor = ''; slotEl.style.color = ''; slotEl.style.background = '';
  // пульсация переезжает на ближайший пустой слот
  const nextEmpty = slotsState.findIndex(s => s===null);
  if(nextEmpty !== -1) $('slots').children[nextEmpty]?.classList.add('active');
}

function checkAnswer(){
  const w = session[wi];
  const slotEls = $('slots').children;
  let wrongIdx = [];
  w.syllables.forEach((expected, i) => {
    if(slotsState[i] && slotsState[i].syl === expected){
      slotEls[i].classList.remove('wrong');
    } else {
      slotEls[i].classList.add('wrong');
      slotEls[i].style.borderColor = 'hsl(8 65% 62%)';
      slotEls[i].style.background = 'hsl(8 70% 95%)';
      slotEls[i].style.color = 'hsl(8 65% 45%)';
      wrongIdx.push(i);
    }
  });
  if(!wrongIdx.length){ wordDone(); return; }
  // неправильно: трясём, говорим, откатываем — ребёнок пробует снова
  // done остаётся true, чтобы ребёнок не мог тапать во время отката
  speak('попробуй ещё');
  setTimeout(()=>{
    wrongIdx.forEach(i => onSlotTap(i));
    done = false; // разблокируем взаимодействие после отката
  }, 1100);
}

function wordDone(){
  done = true; stars++;
  haptic();
  const w = session[wi];
  progress[w.word] = 'mastered';
  saveJSON('sw_progress', progress);

  $('mainCard').classList.add('pop','win-glow');

  // подсветка ударного слога
  if(stressOn && w.syllables.length > 1){
    $('slots').children[w.stress]?.classList.add('stress-ok');
  }

  // спокойная награда: мягкое свечение + плавное «Молодец», без конфетти.
  // «Молодец» ждёт конца зачитывания слова, затем переход к следующему слову
  // отсчитывается от конца «Молодец» (иначе оно перебивает озвучку слова).
  $('levelBarFill').style.width = `${Math.round((wi+1) / session.length * 100)}%`;
  const delayMs = Math.max(1000, Math.round(transitionDelay * 1000));
  speak(w.word, () => {
    if(!done) return;
    speak('молодец', () => {
      setTimeout(()=>{
        $('mainCard').classList.remove('win-glow');
        wi++;
        if(wi >= session.length) showWin(); else loadWord();
      }, delayMs);
    });
  });
}

function showWin(){
  $('winStars').textContent = '⭐'.repeat(Math.min(stars, 10));
  $('winWords').textContent = session.map(w=>w.word).join(' · ');
  $('winOverlay').classList.add('on');
  renderLevels();
  speak('молодец! ты собрала все слова!');
}

function goHome(){
  stopAllAudio();
  $('winOverlay').classList.remove('on');
  $('catOverlay').classList.remove('on');
  $('wordOverlay').classList.remove('on');
  $('settingsOverlay').classList.remove('on');
  ['gameScreen','pickScreen','ynScreen'].forEach(id => $(id).classList.add('hidden'));
  $('homeScreen').classList.remove('hidden');
}

/* ====== РЕЖИМЫ «ПОКАЖИ», «ГЛАГОЛЫ», «ДА/НЕТ» ====== */
const CAT_META = {
  family:['Семья','👨‍👩‍👧'], animals:['Животные','🐱'], food:['Еда','🍎'],
  body:['Тело','✋'], transport:['Транспорт','🚗'], toys:['Игрушки','🧸'],
  household:['Быт','🏠'], social:['Общение','👋'], places:['Места','🗺️'],
  clothes:['Одежда','👕'], nature:['Природа','🌈'], school:['Школа','🎒']
};
const ROUNDS = 8;

function baseWords(catId){
  const seen = new Set(), out = [];
  DATA.levels.forEach(l => l.words.forEach(w => {
    if(w.category === catId && !seen.has(w.word)){
      seen.add(w.word);
      out.push({word: w.word, emoji: emojiFor(w.image)});
    }
  }));
  return out;
}
function shuffled(arr){ return [...arr].sort(() => Math.random() - .5); }

/* --- «Покажи» --- */
let pick = null; // {pool, round, stars, target, mode, title}

function showPickCategories(){
  const panel = $('catPanel');
  panel.innerHTML = '<h2>Выбери категорию</h2>';
  const items = [];
  Object.entries(CAT_META).forEach(([id,[name,emoji]]) => {
    const n = baseWords(id).length;
    if(n >= 3) items.push({id, name, emoji, n});
  });
  EXTRA.categories.forEach(c => items.push({id:c.id, name:c.name, emoji:c.emoji, n:c.words.length}));
  items.forEach(it => {
    const el = document.createElement('div');
    el.className = 'cat-item';
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    el.setAttribute('aria-label', `${it.name}, ${it.n} слов`);
    el.innerHTML = `<span class="ce">${it.emoji}</span><span class="cn">${it.name}</span><span class="cc">${it.n} слов</span>`;
    const pick = () => { $('catOverlay').classList.remove('on'); startPick(it.id); };
    el.onclick = pick;
    el.onkeydown = e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); pick(); } };
    panel.appendChild(el);
  });
  $('catOverlay').classList.add('on');
  focusFirstIn($('catOverlay'));
}
function closeCat(){ $('catOverlay').classList.remove('on'); }

function pickPool(catId){
  const extra = EXTRA.categories.find(c => c.id === catId);
  if(extra) return extra.words.map(w => ({word:w.word, emoji:w.emoji}));
  return baseWords(catId);
}

function startPick(catId){
  const pool = pickPool(catId);
  const meta = CAT_META[catId];
  const extra = EXTRA.categories.find(c => c.id === catId);
  pick = { pool: shuffled(pool), round: 0, stars: 0,
           title: '👂 Покажи · ' + (meta ? meta[0] : extra.name), mode: 'word' };
  enterPickScreen();
}

function startVerbs(){
  pick = { pool: shuffled(EXTRA.verbs.map(v => ({word:v.word, emoji:v.emoji}))),
           round: 0, stars: 0, title: '🏃 Что делает?', mode: 'verb' };
  enterPickScreen();
}

function enterPickScreen(){
  $('homeScreen').classList.add('hidden');
  $('pickScreen').classList.remove('hidden');
  $('pickTag').textContent = pick.title;
  pick.round = 0; pick.stars = 0;
  pickRound();
}

function pickRound(){
  const total = Math.min(ROUNDS, pick.pool.length);
  if(pick.round >= total){ finishMode(); return; }
  $('pickProgress').textContent = `${pick.round+1} / ${total}`;
  // цель + 3 отвлекающих с УНИКАЛЬНЫМИ картинками
  const target = pick.pool[pick.round % pick.pool.length];
  const usedEmoji = new Set([target.emoji]);
  const distract = [];
  for(const w of shuffled(pick.pool.filter(w => w.word !== target.word))){
    if(distract.length >= 3) break;
    if(usedEmoji.has(w.emoji)) continue;   // не берём дубли картинок
    usedEmoji.add(w.emoji);
    distract.push(w);
  }
  // если уникальных не хватило — добираем любые (крайний случай)
  if(distract.length < 3){
    for(const w of shuffled(pick.pool.filter(w => w.word !== target.word && !distract.includes(w)))){
      if(distract.length >= 3) break;
      distract.push(w);
    }
  }
  pick.target = target;
  const options = shuffled([target, ...distract]);

  const grid = $('pickGrid');
  grid.innerHTML = '';
  options.forEach(opt => {
    const c = document.createElement('div');
    c.className = 'pick-card' + (pick.mode === 'verb' ? ' verb-card' : '');
    if(pick.mode === 'verb'){
      const s = document.createElement('span');
      c.appendChild(s);
      setCardContent(s, opt.word, opt.emoji);
      s.style.fontSize = '72px';
      const vb = document.createElement('span');
      vb.className = 'vb'; vb.textContent = opt.word;
      c.appendChild(vb);
    } else {
      setCardContent(c, opt.word, opt.emoji);
    }
    c.setAttribute('role', 'button');
    c.setAttribute('tabindex', '0');
    c.setAttribute('aria-label', opt.word);
    c.onclick = () => onPickTap(c, opt);
    c.onkeydown = e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); onPickTap(c, opt); } };
    grid.appendChild(c);
  });
  announceTarget();
}

function announceTarget(){
  if(pick.mode === 'verb') speakSeq(['что делает?', pick.target.word]);
  else speakSeq(['покажи', pick.target.word]);
}

function onPickTap(card, opt){
  // сначала озвучиваем слово на карточке, потом проверяем ответ
  speak(opt.word, () => {
    if(opt.word === pick.target.word){
      card.classList.add('good');
      pick.stars++;
      haptic();
      spawnParticles();
      speak('правильно');
      pick.round++;
      setTimeout(pickRound, 1200);
    } else {
      card.classList.add('bad');
      speak('попробуй ещё');
      setTimeout(() => card.classList.remove('bad'), 700);
    }
  });
}

/* --- «Да/Нет» --- */
let yn = null; // {round, stars, shown, spoken, answer}

function startYesNo(){
  const all = [];
  Object.keys(CAT_META).forEach(id => baseWords(id).forEach(w => all.push(w)));
  EXTRA.categories.forEach(c => c.words.forEach(w => all.push({word:w.word, emoji:w.emoji})));
  yn = { pool: shuffled(all), round: 0, stars: 0 };
  $('homeScreen').classList.add('hidden');
  $('ynScreen').classList.remove('hidden');
  ynRound();
}

function ynRound(){
  if(yn.round >= ROUNDS){ finishMode(); return; }
  $('ynProgress').textContent = `${yn.round+1} / ${ROUNDS}`;
  const shown = yn.pool[yn.round % yn.pool.length];
  const match = Math.random() < 0.5;
  const spoken = match ? shown
    : shuffled(yn.pool.filter(w => w.word !== shown.word))[0];
  yn.shown = shown; yn.spoken = spoken; yn.answer = match;

  setCardContent($('ynCard'), shown.word, shown.emoji);
  $('ynWord').textContent = `это ${spoken.word}?`;
  setTimeout(() => speakSeq(['это', spoken.word]), 350);
}

function onYn(answer){
  if(answer === yn.answer){
    yn.stars++;
    haptic();
    spawnParticles();
    speak('правильно');
    yn.round++;
    setTimeout(ynRound, 1400);
  } else {
    $('ynCard').style.animation = 'shake .4s';
    $('ynCard').style.borderColor = 'hsl(8 65% 62%)';
    setTimeout(() => {
      $('ynCard').style.animation = '';
      $('ynCard').style.borderColor = '';
    }, 600);
    speak('попробуй ещё');
  }
}

/* --- выбор конкретной карточки уровня (универсально для всех режимов) --- */
function openWordPicker(list, currentIdx, onJump){
  if(!list || !list.length) return;
  const panel = $('wordPanel');
  panel.innerHTML = '<h2>Выбери карточку</h2>';
  list.forEach((w, idx) => {
    const el = document.createElement('div');
    el.className = 'cat-item';
    el.setAttribute('role', 'button');
    el.setAttribute('tabindex', '0');
    const glyph = w.image ? emojiFor(w.image) : (w.emoji || '🖼️');
    const doneMark = statusOf(w) === 'mastered' ? '⭐' : '';
    el.setAttribute('aria-label', `${w.word}${idx === currentIdx ? ', сейчас' : ''} ${doneMark}`);
    el.innerHTML = `<span class="ce">${glyph}</span>
      <span class="cn">${w.word}</span>
      <span class="cc">${idx === currentIdx ? '▶ сейчас' : doneMark}</span>`;
    const select = () => {
      $('wordOverlay').classList.remove('on');
      if(idx !== currentIdx && onJump) onJump(idx);
    };
    el.onclick = select;
    el.onkeydown = e => { if(e.key === 'Enter' || e.key === ' '){ e.preventDefault(); select(); } };
    panel.appendChild(el);
  });
  $('wordOverlay').classList.add('on');
  focusFirstIn($('wordOverlay'));
}
function closeWord(){ $('wordOverlay').classList.remove('on'); }
function openLevelPicker(){ openWordPicker(session, wi, idx => { session = session.slice(idx); wi = 0; loadWord(); }); }
function openPickPicker(){ openWordPicker(pick.pool.slice(0, ROUNDS), pick.round, idx => { pick.round = idx; pickRound(); }); }
function openYnPicker(){ openWordPicker(yn.pool.slice(0, ROUNDS), yn.round, idx => { yn.round = idx; ynRound(); }); }

function finishMode(){  const stars = (pick && !$('pickScreen').classList.contains('hidden')) ? pick.stars
              : (yn ? yn.stars : 0);
  $('pickScreen').classList.add('hidden');
  $('ynScreen').classList.add('hidden');
  $('winStars').textContent = '⭐'.repeat(Math.min(stars, 10));
  $('winWords').textContent = '';
  $('winOverlay').classList.add('on');
  speak('умница');
}

function spawnParticles(){
  const em = ['✨','⭐','💫','🌟'];
  for(let i=0;i<8;i++){
    const p = document.createElement('div');
    p.className='particle';
    p.textContent = em[Math.floor(Math.random()*em.length)];
    p.style.left = (30+Math.random()*40)+'%';
    p.style.top = (40+Math.random()*20)+'%';
    p.style.animationDelay = (Math.random()*.4)+'s';
    document.body.appendChild(p);
    setTimeout(()=>p.remove(), 2400);
  }
}

/* ====== ПРИВЯЗКА UI ====== */
function setToggleAria(el, on){ el.setAttribute('aria-checked', String(on)); }
$('shuffleToggle').classList.toggle('on', shuffleOn); setToggleAria($('shuffleToggle'), shuffleOn);
$('stressToggle').classList.toggle('on', stressOn); setToggleAria($('stressToggle'), stressOn);
$('shuffleToggle').onclick = e => { shuffleOn=!shuffleOn; e.target.classList.toggle('on',shuffleOn); setToggleAria(e.target, shuffleOn); saveSettings(); };
$('stressToggle').onclick  = e => { stressOn=!stressOn;  e.target.classList.toggle('on',stressOn); setToggleAria(e.target, stressOn); saveSettings(); };
function setVoiceGen(g){
  voiceGen = g; saveSettings();
  document.querySelectorAll('.voice-opt').forEach(b => {
    const on = b.dataset.v === g;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', String(on));
  });
}
/* повторное нажатие на диктора читает новое слово по кругу */
const VOICE_DEMO = ['мама','собака','молоко','банан','киса','машина'];
let voiceDemoIdx = 0;
document.querySelectorAll('.voice-opt').forEach(b =>
  b.onclick = () => {
    setVoiceGen(b.dataset.v);
    speak(VOICE_DEMO[voiceDemoIdx % VOICE_DEMO.length]);
    voiceDemoIdx++;
  });
setVoiceGen(voiceGen);
function setPicMode(m){
  picMode = m; saveSettings();
  document.querySelectorAll('.pic-opt').forEach(b => {
    const on = b.dataset.p === m;
    b.classList.toggle('on', on);
    b.setAttribute('aria-pressed', String(on));
  });
}
document.querySelectorAll('.pic-opt').forEach(b =>
  b.onclick = () => setPicMode(b.dataset.p));
setPicMode(picMode);
$('speedSlider').value = speechSpeed;
$('speedVal').textContent = Number(speechSpeed).toFixed(2).replace(/0$/,'');
$('speedSlider').oninput = e => {
  speechSpeed = parseFloat(e.target.value);
  $('speedVal').textContent = speechSpeed.toFixed(2).replace(/0$/,'');
  saveSettings();
};
$('speedSlider').onchange = () => speak('мама');   // сразу слышно новый темп
$('delaySlider').value = transitionDelay;
$('delayVal').textContent = Number(transitionDelay).toFixed(1).replace(/\.0$/,'');
$('delaySlider').oninput = e => {
  transitionDelay = parseFloat(e.target.value);
  $('delayVal').textContent = transitionDelay.toFixed(1).replace(/\.0$/,'');
  saveSettings();
};
$('resetProgressBtn').onclick = () => {
  if(confirm('Сбросить весь прогресс ребёнка? Это действие нельзя отменить.')){
    // сброс = убрать пользовательский прогресс; исходные статусы из JSON (mastered/learning)
    // сохраняем как стартовую точку методиста, не затираем до planned
    try { localStorage.removeItem('sw_progress'); } catch(e){}
    Object.keys(progress).forEach(k => delete progress[k]);
    renderLevels();
  }
};
$('backBtn').onclick = goHome;
$('winMenuBtn').onclick = goHome;
function closeSettings(){ $('settingsOverlay').classList.remove('on'); $('gearBtn').focus(); }
function focusFirstIn(ov){
  const f = ov.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  (f[0] || ov).focus();
}
function trapFocus(e){
  const ovs = ['settingsOverlay','catOverlay','wordOverlay'];
  if(e.key === 'Escape'){
    if($('settingsOverlay').classList.contains('on')) closeSettings();
    else if($('catOverlay').classList.contains('on')) closeCat();
    else if($('wordOverlay').classList.contains('on')) closeWord();
    return;
  }
  if(e.key !== 'Tab') return;
  const ov = ovs.map(id => $(id)).find(o => o.classList.contains('on'));
  if(!ov) return;
  const f = ov.querySelectorAll('button, [href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
  const list = Array.from(f).filter(el => !el.disabled && el.offsetParent !== null);
  if(!list.length) return;
  const first = list[0], last = list[list.length-1];
  if(e.shiftKey && document.activeElement === first){ e.preventDefault(); last.focus(); }
  else if(!e.shiftKey && document.activeElement === last){ e.preventDefault(); first.focus(); }
}

$('gearBtn').onclick = () => {
  const ov = $('settingsOverlay');
  ov.classList.add('on');
  const focusables = ov.querySelectorAll('button, [href], input, select, [tabindex]:not([tabindex="-1"])');
  (focusables[0] || ov).focus();
};
document.addEventListener('keydown', trapFocus);
$('progressPill').onclick = openLevelPicker;
$('pickProgress').onclick = openPickPicker;
$('ynProgress').onclick = openYnPicker;
$('mainCard').onclick = () => { if(session[wi]) speak(session[wi].word); };
$('pickHear').onclick = () => { if(pick) announceTarget(); };
$('ynYes').onclick = () => onYn(true);
$('ynNo').onclick = () => onYn(false);
$('ynCard').onclick = () => { if(yn) speakSeq(['это', yn.spoken.word]); };

renderLevels();
</script>
